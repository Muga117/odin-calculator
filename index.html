<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Calculator</title>
    <link rel="stylesheet" href="stye.css">
</head>
<body>
    <div class="calculator-container">
        <div class ="display-container">
            <p></p>
        </div>
        <div class = "button-container">
            <div class = "number-buttons">
                <button class = "button value top-left" value="9">9</button>
                <button class = "button value" value="8">8</button>
                <button class = "button value" value="7">7</button>
                <button class = "button value" value="6">6</button>
                <button class = "button value" value="5">5</button>
                <button class = "button value" value="4">4</button>
                <button class = "button value" value="3">3</button>
                <button class = "button value" value="2">2</button>
                <button class = "button value bottom-left" value="1">1</button>
                <button class = "button value" value="0">0</button>
            </div>
            <div class = "operator-buttons">
                <button class = "button value" value="+">+</button>
                <button class = "button value top-right" value="-">-</button>
                <button class = "button value" value="x">X</button>
                <button class = "button value" value="÷">÷</button>
                <button class = "button equal" value="=">=</button>
                <button class = "button clear bottom-right" value="">CL</button>
            </div>
        </div>
    </div>
    <script src="javascript.js" defer></script>
</body>
</html>
